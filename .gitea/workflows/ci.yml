name: CI

# Gitea is the primary remote. This runs the full gate on every push and PR.
#
# It deliberately does NOT publish. npm provenance — which n8n's verification
# requires, and which its scanner hard-fails without — can only be generated by
# GitHub Actions or GitLab CI, because npm signs the attestation with the CI's
# OIDC token via Sigstore. Gitea Actions sets GITHUB_ACTIONS=true for
# compatibility, so npm takes the GitHub branch and then fails on the missing
# ACTIONS_ID_TOKEN_REQUEST_URL. Publishing therefore happens on the GitHub
# mirror, from .github/workflows/publish.yml.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify the compiled package loads under plain node
        run: node scripts/verify-dist.mjs

      - name: Run n8n's community-package static analyser
        run: node scripts/scan.mjs

      - name: Check the vendored crypto reproduces from upstream
        run: |
          node scripts/vendor.mjs
          git diff --exit-code src/vendor VENDOR.md
