name: Publish

# Publishes to npm with provenance.
#
# Provenance is not optional for this package: n8n's verification requires it,
# and @n8n/scan-community-package hard-fails a package whose registry metadata
# has no `dist.attestations.provenance`. npm can only generate it under
# GITHUB_ACTIONS or GITLAB_CI, because it signs the attestation through Sigstore
# using the CI's OIDC token. That is why this repo lives on GitHub.
#
# Provenance attests repository + commit, so package.json's `repository.url`
# must match this repo, case-sensitively.

on:
  release:
    types: [published]
  # A plain `npm version && git push --tags` releases without opening the GitHub UI.
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for provenance; without it npm errors EUSAGE

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest # provenance requires a GitHub-hosted runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # A tag that disagrees with package.json would publish the wrong version
      # under a provenance statement that says otherwise. Fail loudly instead.
      - name: Check the tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p 'require("./package.json").version')"
          echo "tag=$TAG package.json=$PKG"
          test "$TAG" = "$PKG"

      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: node scripts/verify-dist.mjs
      - run: node scripts/scan.mjs

      # publishConfig in package.json supplies --provenance --access public.
      # Provenance works with a plain npm token; Trusted Publishing is optional
      # and cannot be configured for a package that does not exist on npm yet,
      # so the first publish must use NPM_TOKEN.
      - name: Publish to npm with provenance
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
