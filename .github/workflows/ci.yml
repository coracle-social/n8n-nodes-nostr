name: CI

# Runs the full gate on every push and pull request.
#
# Publishing lives in publish.yml, which only fires on a release or a v* tag.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify the compiled package loads under plain node
        run: node scripts/verify-dist.mjs

      - name: Run n8n's community-package static analyser
        run: node scripts/scan.mjs

      - name: Check the vendored crypto reproduces from upstream
        run: |
          node scripts/vendor.mjs
          git diff --exit-code vendor VENDOR.md
